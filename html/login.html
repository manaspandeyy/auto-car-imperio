<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width initial-scale=1 maximum-scale=1 minimum-scale=1">
    <title>ABI- Login</title>
    <link rel="icon" href="../assets/img/logo.png">
    <link rel="stylesheet" href="../css/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body class="login_bgColor">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-9 col-lg-12 col-xl-10">
                <div class="card shadow-lg o-hidden border-0 my-5">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-lg-6 d-none d-lg-flex">
                                <div class="flex-grow-1 bg-login-image d-flex flex-column justify-content-center align-items-center text-center text-white"
                                    style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('../assets/img/cars/AUDI.jpg') center/cover; border-radius: 10px 0 0 10px;">
                                    <img style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px;"
                                        src="../assets/img/logo.png" alt="Logo">
                                    <h3
                                        style="font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: 2px; margin-bottom: 10px;">
                                        AUTO BEST IMPERIO</h3>
                                    <p style="font-weight: 300; font-size: 1.1rem;">Your Journey Begins Here</p>
                                </div>
                            </div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h4 class="text-dark mb-4">Welcome Back ABI !</h4>
                                    </div>
                                    <form class="user" id="loginForm">
                                        <div class="form-group">
                                            <input class="form-control form-control-user mt-5 mb-4" type="email"
                                                id="txtUserName" placeholder="Enter email..." name="email" required>
                                        </div>
                                        <div class="form-group">
                                            <input class="form-control form-control-user mb-5" type="password"
                                                id="txtPassword" placeholder="Password" name="password" required>
                                        </div>

                                        <div id="alertMsg" class="alert d-none mt-3" role="alert"></div>
                                        <button class="btn btn-dark btn-block text-white btn-user mb-4 w-100"
                                            type="submit" id="btn_Login">Login</button>
                                    </form>
                                    <div class="text-center mt-4"><a class="small" href="forgottenPassword.html">Forgot
                                            Password?</a></div>
                                    <div class="text-center"><a class="small" href="registration.html">Create an
                                            Account!</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/jquery.min.js"></script>
    <script src="../js/bootstrap.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('txtUserName').value;
            const password = document.getElementById('txtPassword').value;
            const alertMsg = document.getElementById('alertMsg');

            const storedUser = localStorage.getItem('abi_user');

            if (storedUser) {
                const user = JSON.parse(storedUser);
                if (user.email === email && user.password === password) {
                    localStorage.setItem('abi_loggedIn', 'true');
                    alertMsg.className = 'alert alert-success mt-3';
                    alertMsg.classList.remove('d-none');
                    alertMsg.textContent = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 1000);
                    return;
                }
            }

            alertMsg.className = 'alert alert-danger mt-3';
            alertMsg.classList.remove('d-none');
            alertMsg.textContent = 'Invalid email or password.';
        });
    </script>
</body>

</html>
