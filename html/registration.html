<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1">
    <title>GMA - Register</title>
    <link rel="icon" href="../assets/img/logo.png">
    <link rel="stylesheet" href="../css/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../css/register.css">
</head>

<body class="bgColor">
    <div class="container">
        <div class="card shadow-lg o-hidden border-0 my-5 mb-5">
            <div class="card-body p-0">
                <div class="row">
                    <div class="col-lg-5 d-none d-lg-flex">
                        <div class="flex-grow-1 bg-register-image d-flex flex-column justify-content-center align-items-center text-center text-white"
                            style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('../assets/img/cars/VINTAGE.jpg') center/cover; border-radius: 10px 0 0 10px;">
                            <img style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px;"
                                src="../assets/img/logo.png" alt="Logo">
                            <h3
                                style="font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: 2px; margin-bottom: 10px;">
                                AUTO BEST IMPERIO</h3>
                            <p style="font-weight: 300; font-size: 1.1rem;">Join for the Best Rentals</p>
                        </div>
                    </div>
                    <div class="col-lg-7">
                        <div class="p-5">
                            <div class="text-center">
                                <h4 class="text-dark mb-5">Create ABI an Account!</h4>
                            </div>

                            <form class="user" id="registerForm">
                                <div class="form-group row">
                                    <div class="col-sm-6 mb-3">
                                        <input class="form-control form-control-user" type="text"
                                            placeholder="First Name" name="firstname" id="txtFName" required>
                                    </div>
                                    <div class="col-sm-6 mb-3">
                                        <input class="form-control form-control-user" type="text"
                                            placeholder="Last Name" name="lastname" id="txtLName" required>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <input class="form-control form-control-user mb-4" type="email"
                                        aria-describedby="emailHelp" placeholder="Email Address" name="email"
                                        id="txtEmail" required>
                                </div>
                                <div class="form-group row">
                                    <div class="col-sm-6 mb-3 mb-sm-0">
                                        <input class="form-control form-control-user" type="password"
                                            placeholder="Password" name="password" id="txtPassword" required>
                                    </div>
                                    <div class="col-sm-6 mb-3">
                                        <input class="form-control form-control-user" type="password"
                                            placeholder="Repeat Password" name="password_repeat" id="txtConfirmPassword"
                                            required>
                                    </div>
                                </div>
                                <div id="alertMsg" class="alert d-none mt-3" role="alert"></div>
                                <button class="btn btn-dark btn-block text-white btn-user mb-5 w-100" type="submit">
                                    Register Account
                                </button>
                            </form>
                            <div class="text-center"><a class="small" href="forgottenPassword.html">Forgot Password?</a>
                            </div>
                            <div class="text-center"><a class="small" href="login.html">Already have an account?
                                    Login!</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/jquery.min.js"></script>
    <script src="../js/bootstrap.min.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const fName = document.getElementById('txtFName').value;
            const lName = document.getElementById('txtLName').value;
            const email = document.getElementById('txtEmail').value;
            const password = document.getElementById('txtPassword').value;
            const confirmMsg = document.getElementById('txtConfirmPassword').value;
            const alertMsg = document.getElementById('alertMsg');

            if (password !== confirmMsg) {
                alertMsg.className = 'alert alert-danger mt-3';
                alertMsg.classList.remove('d-none');
                alertMsg.textContent = 'Passwords do not match!';
                return;
            }

            const user = { firstName: fName, lastName: lName, email: email, password: password, wallet: 500, rides: 0 };
            localStorage.setItem('abi_user', JSON.stringify(user));

            alertMsg.className = 'alert alert-success mt-3';
            alertMsg.classList.remove('d-none');
            alertMsg.textContent = 'You have registered successfully! Redirecting...';

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        });
    </script>
</body>

</html>
